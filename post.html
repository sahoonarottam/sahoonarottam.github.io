<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loading… — Dr. Narottam Sahoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="wrap post-wrap">
  <a href="blog.html" class="back-link">← All writings</a>
  <div id="post-meta" class="post-meta"></div>
  <h1 id="post-title" class="post-title">Loading…</h1>
  <div id="post-body" class="post-body">
    <div class="loading">Loading post…</div>
  </div>
</div>

<footer>
  <div class="wrap">
    <span>&copy; <span id="year"></span> Dr. Narottam Sahoo</span>
    <span>
      <a href="index.html">Home</a> ·
      <a href="blog.html">Writings</a> ·
      <a href="admin/">Admin</a>
    </span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
<script src="js/config.js"></script>
<script src="js/github-api.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');

  (async () => {
    if (!slug) {
      document.getElementById('post-title').textContent = 'Post not found';
      document.getElementById('post-body').innerHTML = '<p>No post was specified. <a href="blog.html">Back to writings →</a></p>';
      return;
    }
    try {
      const post = await window.BlogAPI.getPost(slug);
      document.title = `${post.title} — Dr. Narottam Sahoo`;
      document.getElementById('post-title').textContent = post.title;
      document.getElementById('post-meta').textContent = window.BlogAPI.formatDate(post.date);
      const html = DOMPurify.sanitize(marked.parse(post.body));
      document.getElementById('post-body').innerHTML = html;
    } catch (err) {
      document.getElementById('post-title').textContent = 'Post not found';
      document.getElementById('post-body').innerHTML = '<p>Sorry, this post could not be loaded. <a href="blog.html">Back to writings →</a></p>';
    }
  })();
</script>

</body>
</html>
